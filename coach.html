<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーチダッシュボード | コンディション記録</title>
<style>
  :root{
    --orange:#854F0B; --orange-bg:#FAEEDA; --orange-bd:#E8C078;
    --blue:#185FA5; --blue-bg:#E6F1FB;
    --green:#27500A; --green-bg:#EAF3DE;
    --red:#A32D2D; --red-bg:#FCEBEB;
    --ink:#2B2B2B; --sub:#6E6E73; --line:#E5E1D8;
    --bg:#FBFAF7; --card:#FFFFFF;
    --am:#B5530A; --am-bg:#FDEFDC; --am-bd:#EFC08A;
    --pm:#3A3D8F; --pm-bg:#EAEAFA; --pm-bd:#B9B7E8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;}

  /* ログイン画面 */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.05)}
  .login-title{font-size:19px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .brand-icon{width:28px;height:28px;border-radius:8px;object-fit:cover;flex-shrink:0;vertical-align:middle}
  .login-sub{font-size:12.5px;color:var(--sub);margin-bottom:24px}
  .login-field{margin-bottom:14px}
  .login-field label{display:block;font-size:11.5px;color:var(--sub);font-weight:600;margin-bottom:6px}
  .login-field input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;background:var(--bg);box-sizing:border-box}
  .login-field input:focus{outline:none;border-color:var(--orange-bd)}
  .login-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--orange);color:#fff;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:8px}
  .login-btn:disabled{opacity:0.5;cursor:default}
  .login-error{background:var(--red-bg);color:var(--red);font-size:12px;border-radius:10px;padding:10px 12px;margin-top:14px;display:none}
  .login-error.show{display:block}

  /* ダッシュボード */
  .dash-wrap{max-width:1080px;margin:0 auto;padding:24px 20px 60px}
  .dash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .dash-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px}
  .dash-hdr-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--sub)}
  .logout-btn{background:none;border:1.5px solid var(--line);border-radius:8px;padding:7px 12px;font-size:11.5px;color:var(--sub);cursor:pointer}

  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab-btn{padding:10px 18px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);
    font-size:13px;font-weight:700;color:var(--sub);cursor:pointer}
  .tab-btn.active{background:var(--orange-bg);border-color:var(--orange-bd);color:var(--orange)}

  .pane{display:none}
  .pane.show{display:block}

  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .stat-card .num{font-size:26px;font-weight:800;color:var(--orange)}
  .stat-card .lbl{font-size:11.5px;color:var(--sub);margin-top:2px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:18px}
  .panel-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .panel-title .card-sub{font-size:11px;font-weight:500;color:var(--sub)}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--sub);font-weight:700;font-size:11px;padding:8px 10px;border-bottom:2px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  tr.clickable{cursor:pointer}
  tr.clickable:hover{background:var(--bg)}

  .status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
  .badge.ok{background:var(--green-bg);color:var(--green)}
  .badge.ng{background:var(--red-bg);color:var(--red)}

  select{border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;background:var(--card);color:var(--ink);margin-bottom:16px}

  .graph-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
  .graph-legend span{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--sub)}
  .graph-legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

  .empty-msg{font-size:12px;color:var(--sub);padding:20px;text-align:center}
  .loading-msg{font-size:12px;color:var(--sub);padding:20px;text-align:center}

  @media (max-width: 640px){
    table{font-size:11px}
    th,td{padding:7px 6px}
  }
</style>
</head>

  <div class="tabs">

  <!-- 今日の状況 -->
  <div class="pane show" id="pane-today">
    <div class="stat-row" id="today-stats"></div>
    <div class="panel">
      <div class="panel-title">今日の提出状況<span class="card-sub" id="today-date-label"></span></div>
      <div id="today-table-wrap"><div class="loading-msg">読み込み中…</div></div>
    </div>
  </div>

  <!-- チーム概況 -->
  <div class="pane" id="pane-team">
    <div class="panel">
      <div class="panel-title">各選手の直近の記録</div>
      <div id="team-table-wrap"><div class="loading-msg">読み込み中…</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">午前練習のRPE<span class="card-sub">グループ別の平均・1〜10</span></div>
      <div id="team-graph-rpe-am"></div>
    </div>
    <div class="panel">
      <div class="panel-title">午後練習のRPE<span class="card-sub">グループ別の平均・1〜10</span></div>
      <div id="team-graph-rpe-pm"></div>
    </div>
    <div class="panel">
      <div class="panel-title">自主練習のRPE<span class="card-sub">全体平均・1〜10</span></div>
      <div id="team-graph-rpe-jishu"></div>
    </div>
    <div class="panel">
      <div class="panel-title">陸上トレーニングのRPE<span class="card-sub">全体平均・1〜10</span></div>
      <div id="team-graph-rpe-land"></div>
    </div>

  <!-- 選手別 -->
  <div class="pane" id="pane-player">
    <select id="player-select" onchange="renderPlayerDetail(this.value)"></select>
    <div id="player-detail-wrap"><div class="empty-msg">選手を選んでください</div></div>

<script>
  // ════════════════════════════════════════════════════
  // player.html と同じFirebaseプロジェクトの設定値
  // ════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyCpZy9SpzQS3y6r2iZUVUttSAgslZ8R6JI",
    authDomain: "swimcondition.firebaseapp.com",
    databaseURL: "https://swimcondition-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "swimcondition"
  };
  const DB_BASE = (firebaseConfig.databaseURL || '').replace(/\/$/, '');

  const SESS_LABELS = { AM:'午前練習', PM:'午後練習', JISHU:'自主練習', LAND:'陸上トレーニング' };

  let idToken = sessionStorage.getItem('coach_idToken') || null;
  let userEmail = sessionStorage.getItem('coach_email') || '';
  let allData = {}; // { playerId: { entryId: entry, ... }, ... }

  // ── Firebase Authentication（REST API。SDK不要） ──
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.classList.remove('show');
    if (!email || !password) {
      errEl.textContent = 'メールアドレスとパスワードを入力してください。';
      errEl.classList.add('show');
      return;
    }
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'サインイン中…';
    try {
      const res = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=' + firebaseConfig.apiKey, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, returnSecureToken: true })
      });
      const data = await res.json();
      if (data.error) {
        throw new Error(data.error.message === 'INVALID_LOGIN_CREDENTIALS' || data.error.message === 'EMAIL_NOT_FOUND' || data.error.message === 'INVALID_PASSWORD'
          ? 'メールアドレスまたはパスワードが正しくありません。'
          : data.error.message);
      }
      idToken = data.idToken;
      userEmail = data.email;
      sessionStorage.setItem('coach_idToken', idToken);
      sessionStorage.setItem('coach_email', userEmail);
      showDashboard();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'サインイン';
    }
  }

  function doLogout() {
    idToken = null;
    sessionStorage.removeItem('coach_idToken');
    sessionStorage.removeItem('coach_email');
    document.getElementById('dash-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // Enterキーでもサインインできるように
  document.addEventListener('DOMContentLoaded', () => {
    ['login-email', 'login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    });
  });

  async function fetchAllConditions() {
    const res = await fetch(DB_BASE + '/conditions.json?auth=' + idToken);
    if (res.status === 401 || res.status === 403) {
      throw new Error('AUTH_EXPIRED');
    }
    if (!res.ok) throw new Error('読み込みエラー (HTTP ' + res.status + ')');
    const data = await res.json();
    return data || {};
  }

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dash-screen').style.display = 'block';
    document.getElementById('login-user-email').textContent = userEmail;
    loadAll();
  }

  async function loadAll() {
    try {
      allData = await fetchAllConditions();
      renderToday();
      renderTeam();
      renderPlayerSelect();
    } catch (e) {
      if (e.message === 'AUTH_EXPIRED') {
        alert('セッションの有効期限が切れました。もう一度サインインしてください。');
        doLogout();
      } else {
        document.getElementById('today-table-wrap').innerHTML = '<div class="empty-msg">' + e.message + '</div>';
      }
    }
  }

  // ── 共通：playerId -> 最新の選手名、全エントリーのフラットなリスト ──
  function getPlayerList() {
    const players = [];
    Object.keys(allData).forEach(pid => {
      const entries = Object.entries(allData[pid] || {}).map(([key, e]) => Object.assign({ key, playerId: pid }, e));
      entries.sort((a, b) => (b.submittedAt || 0) - (a.submittedAt || 0));
      const name = (entries[0] && entries[0].playerName) || pid;
      players.push({ playerId: pid, name, entries });
    });
    players.sort((a, b) => a.name.localeCompare(a.name === b.name ? '' : b.name, 'ja'));
    return players;
  }

  function todayStr() {
    const t = new Date();
    return t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0');
  }

  function getEntryLandTypes(e) {
    return Array.isArray(e.landTypes) ? e.landTypes : (e.landType ? [e.landType] : []);
  }

  function entrySummaryText(e) {
    const sess = e.session ? (SESS_LABELS[e.session] || (e.session === 'NONE' ? '休み' : e.session)) : '記録';
    const parts = [sess];
    if (e.group) parts.push(e.group);
    if (e.session === 'JISHU' && e.duration != null) parts.push(e.duration + 'h');
    if (e.session === 'LAND') {
      const lts = getEntryLandTypes(e);
      if (lts.length) parts.push(lts.join('/'));
    }
    if (e.weightTime != null && e.wakeWeight != null) {
      const tLabel = (!e.weightTime || e.weightTime === 'wake') ? '起床時' : e.weightTime;
      parts.push(e.wakeWeight + 'kg(' + tLabel + ')');
    } else if (e.wakeWeight != null) {
      parts.push(e.wakeWeight + 'kg');
    }
    if (e.rpe != null) parts.push('RPE' + e.rpe);
    return parts.join('・');
  }

  function calcEstimated1RM(weight, reps) {
    if (!weight || !reps) return 0;
    return weight * (1 + reps / 40);
  }

  // Strengthのセット詳細をHTMLテーブルとして組み立てる（種目ごと）
  function buildStrengthDetailHtml(strengthLog) {
    if (!Array.isArray(strengthLog) || !strengthLog.length) return '';
    let html = '<div style="margin-top:8px;padding:10px 12px;background:var(--bg);border-radius:10px">';
    strengthLog.forEach(ex => {
      const validSets = (ex.sets || []).filter(s => s.reps > 0 && s.weight > 0);
      if (!validSets.length) return;
      html += '<div style="font-size:11.5px;font-weight:700;margin:6px 0 4px">' + escapeHtml(ex.name || '') + '</div>';
      html += '<table style="font-size:11px"><tr><th>セット</th><th>重さ</th><th>回数</th><th>合計</th><th>推定1RM</th></tr>';
      validSets.forEach((s, i) => {
        const rm = calcEstimated1RM(s.weight, s.reps);
        html += '<tr><td>' + (i + 1) + '</td><td>' + s.weight + 'kg</td><td>' + s.reps + '回</td><td>' + (s.weight * s.reps) + 'kg</td><td>' + rm.toFixed(1) + 'kg</td></tr>';
      });
      html += '</table>';
    });
    html += '</div>';
    return html;
  }

  // ══ タブ1：今日の状況 ══
  function renderToday() {
    const players = getPlayerList();
    const today = todayStr();
    document.getElementById('today-date-label').textContent = today.slice(5).replace('-', '/') + ' 時点';

    let submitted = 0, notSubmitted = 0;
    const rows = players.map(p => {
      const todays = p.entries.filter(e => e.date === today);
      const did = todays.length > 0;
      if (did) submitted++; else notSubmitted++;
      const summary = did ? todays.map(entrySummaryText).join(' / ') : '—';
      return { name: p.name, did, summary };
    });
    rows.sort((a, b) => (a.did === b.did ? a.name.localeCompare(b.name, 'ja') : (a.did ? 1 : -1)));

    document.getElementById('today-stats').innerHTML =
      '<div class="stat-card"><div class="num">' + submitted + '</div><div class="lbl">提出済み</div></div>' +
      '<div class="stat-card"><div class="num">' + notSubmitted + '</div><div class="lbl">未提出</div></div>' +
      '<div class="stat-card"><div class="num">' + players.length + '</div><div class="lbl">記録のある選手数</div></div>';

    if (!rows.length) {
      document.getElementById('today-table-wrap').innerHTML = '<div class="empty-msg">まだ記録がありません</div>';
      return;
    }
    let html = '<table><tr><th>選手</th><th>状態</th><th>内容</th></tr>';
    rows.forEach(r => {
      html += '<tr><td>' + escapeHtml(r.name) + '</td>' +
        '<td>' + (r.did ? '<span class="badge ok">提出済み</span>' : '<span class="badge ng">未提出</span>') + '</td>' +
        '<td>' + escapeHtml(r.summary) + '</td></tr>';
    });
    html += '</table>';
    document.getElementById('today-table-wrap').innerHTML = html;
  }

  // ══ タブ2：チーム概況 ══
  const TEAM_PALETTE = ['var(--orange)', 'var(--pm)', 'var(--green)', 'var(--red)', 'var(--am)', 'var(--blue)', '#8E44AD', '#16A085'];

  // 指定したセッション種別について、日付ごとの平均RPEを「グループ別」に集計する
  function buildGroupRpeSeries(sessionType) {
    const groupDateMap = {};
    Object.values(allData).forEach(playerEntries => {
      Object.values(playerEntries).forEach(e => {
        if (e.session !== sessionType || e.rpe == null || !e.date) return;
        const g = e.group || '（グループ未設定）';
        if (!groupDateMap[g]) groupDateMap[g] = {};
        if (!groupDateMap[g][e.date]) groupDateMap[g][e.date] = [];
        groupDateMap[g][e.date].push(e.rpe);
      });
    });
    return Object.keys(groupDateMap).sort().map((g, i) => {
      const byDate = groupDateMap[g];
      const points = Object.keys(byDate).sort().map(d => {
        const arr = byDate[d];
        return { date: d, value: Math.round((arr.reduce((a, b) => a + b, 0) / arr.length) * 10) / 10 };
      }).slice(-20);
      return { label: g, color: TEAM_PALETTE[i % TEAM_PALETTE.length], points };
    });
  }

  // 指定したセッション種別について、日付ごとの平均RPEを「全体（グループ分けなし）」で集計する
  function buildOverallRpeSeries(sessionType) {
    const byDate = {};
    Object.values(allData).forEach(playerEntries => {
      Object.values(playerEntries).forEach(e => {
        if (e.session !== sessionType || e.rpe == null || !e.date) return;
        if (!byDate[e.date]) byDate[e.date] = [];
        byDate[e.date].push(e.rpe);
      });
    });
    return Object.keys(byDate).sort().map(d => {
      const arr = byDate[d];
      return { date: d, value: Math.round((arr.reduce((a, b) => a + b, 0) / arr.length) * 10) / 10 };
    }).slice(-20);
  }

  function renderTeam() {
    const players = getPlayerList();
    if (!players.length) {
      document.getElementById('team-table-wrap').innerHTML = '<div class="empty-msg">まだ記録がありません</div>';
      ['am', 'pm', 'jishu', 'land'].forEach(s => { document.getElementById('team-graph-rpe-' + s).innerHTML = ''; });
      return;
    }
    let html = '<table><tr><th>選手</th><th>直近記録日</th><th>RPE</th><th>疲労度</th></tr>';
    players.forEach(p => {
      const latest = p.entries[0];
      const d = latest ? (latest.date || '').slice(5).replace('-', '/') : '—';
      html += '<tr class="clickable" onclick="goToPlayer(\'' + p.playerId.replace(/'/g, "\\'") + '\')">' +
        '<td>' + escapeHtml(p.name) + '</td>' +
        '<td>' + d + '</td>' +
        '<td>' + (latest && latest.rpe != null ? latest.rpe : '—') + '</td>' +
        '<td>' + (latest && latest.fatigue != null ? latest.fatigue : '—') + '</td></tr>';
    });
    html += '</table>';
    document.getElementById('team-table-wrap').innerHTML = html;

    const amDefs = buildGroupRpeSeries('AM');
    document.getElementById('team-graph-rpe-am').innerHTML = buildLegendHtml(amDefs) + buildMultiLineChartSVG(amDefs);

    const pmDefs = buildGroupRpeSeries('PM');
    document.getElementById('team-graph-rpe-pm').innerHTML = buildLegendHtml(pmDefs) + buildMultiLineChartSVG(pmDefs);

    const jishuPoints = buildOverallRpeSeries('JISHU');
    document.getElementById('team-graph-rpe-jishu').innerHTML = buildMultiLineChartSVG([{ label: '自主練習', color: 'var(--orange)', points: jishuPoints }]);

    const landPoints = buildOverallRpeSeries('LAND');
    document.getElementById('team-graph-rpe-land').innerHTML = buildMultiLineChartSVG([{ label: '陸上トレーニング', color: 'var(--green)', points: landPoints }]);
  }

  function goToPlayer(playerId) {
    switchTab('player');
    document.getElementById('player-select').value = playerId;
    renderPlayerDetail(playerId);
  }

  // ══ タブ3：選手別詳細 ══
  function renderPlayerSelect() {
    const players = getPlayerList();
    const sel = document.getElementById('player-select');
    sel.innerHTML = '<option value="">選手を選んでください</option>' +
      players.map(p => '<option value="' + p.playerId + '">' + escapeHtml(p.name) + '</option>').join('');
  }

  let currentDetailPlayerId = null;
  let detailDateFrom = '';
  let detailDateTo = '';
  let detailShowAll = false;
  const DETAIL_TABLE_LIMIT = 30;

  function buildDetailFilterHtml() {
    return '<div class="panel-title">期間で絞り込み<span class="card-sub">空欄なら全期間</span></div>' +
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">' +
      '<input type="date" id="detail-date-from" value="' + detailDateFrom + '" onchange="onDetailFromChange(this.value)" style="border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;background:var(--bg)">' +
      '<span style="color:var(--sub);font-size:12px">〜</span>' +
      '<input type="date" id="detail-date-to" value="' + detailDateTo + '" onchange="onDetailToChange(this.value)" style="border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;background:var(--bg)">' +
      '<button type="button" onclick="clearDetailFilter()" style="background:none;border:1.5px solid var(--line);border-radius:8px;padding:7px 12px;font-size:11.5px;color:var(--sub);cursor:pointer">クリア</button>' +
      '</div>';
  }

  function onDetailFromChange(val) { detailDateFrom = val; detailShowAll = false; renderPlayerDetail(currentDetailPlayerId); }
  function onDetailToChange(val) { detailDateTo = val; detailShowAll = false; renderPlayerDetail(currentDetailPlayerId); }
  function clearDetailFilter() { detailDateFrom = ''; detailDateTo = ''; detailShowAll = false; renderPlayerDetail(currentDetailPlayerId); }
  function showAllDetailRows() { detailShowAll = true; renderPlayerDetail(currentDetailPlayerId); }

  function renderPlayerDetail(playerId) {
    if (playerId !== currentDetailPlayerId) {
      detailDateFrom = '';
      detailDateTo = '';
      detailShowAll = false;
    }
    currentDetailPlayerId = playerId;
    const wrap = document.getElementById('player-detail-wrap');
    if (!playerId) { wrap.innerHTML = '<div class="empty-msg">選手を選んでください</div>'; return; }
    const entries = Object.entries(allData[playerId] || {}).map(([key, e]) => Object.assign({ key }, e));
    entries.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.submittedAt || 0) - (a.submittedAt || 0));
    if (!entries.length) { wrap.innerHTML = '<div class="empty-msg">この選手の記録がまだありません</div>'; return; }

    let filtered = entries;
    if (detailDateFrom) filtered = filtered.filter(e => (e.date || '') >= detailDateFrom);
    if (detailDateTo) filtered = filtered.filter(e => (e.date || '') <= detailDateTo);

    let html = '<div class="panel">' + buildDetailFilterHtml() + '</div>';

    if (!filtered.length) {
      html += '<div class="panel"><div class="empty-msg">この期間の記録はありません</div></div>';
      wrap.innerHTML = html;
      return;
    }

    const weightPoints = buildSinglePlayerSeries(filtered, 'wakeWeight');
    const rpePoints = buildSinglePlayerSeries(filtered, 'rpe');
    const fatiguePoints = buildSinglePlayerSeries(filtered, 'fatigue');

    html += '<div class="panel"><div class="panel-title">体重の推移<span class="card-sub">kg</span></div>' +
      buildMultiLineChartSVG([{ label: '体重', color: 'var(--orange)', points: weightPoints }]) + '</div>';
    html += '<div class="panel"><div class="panel-title">RPE・疲労度の推移</div>' +
      buildLegendHtml([{ label: 'RPE', color: 'var(--orange)', points: rpePoints }, { label: '疲労度', color: 'var(--blue)', points: fatiguePoints }]) +
      buildMultiLineChartSVG([{ label: 'RPE', color: 'var(--orange)', points: rpePoints }, { label: '疲労度', color: 'var(--blue)', points: fatiguePoints }]) + '</div>';

    const tableEntries = detailShowAll ? filtered : filtered.slice(0, DETAIL_TABLE_LIMIT);
    html += '<div class="panel"><div class="panel-title">記録一覧<span class="card-sub">' +
      (filtered.length > DETAIL_TABLE_LIMIT && !detailShowAll ? '直近' + DETAIL_TABLE_LIMIT + '件を表示中（全' + filtered.length + '件）' : '全' + filtered.length + '件') +
      '・Strengthの記録がある行はクリックで詳細表示</span></div><table><tr><th>日付</th><th>内容</th><th>メモ</th></tr>';
    tableEntries.forEach((e, idx) => {
      const d = (e.date || '').slice(5).replace('-', '/');
      const hasStrength = Array.isArray(e.strengthLog) && e.strengthLog.length;
      const rowId = 'pdrow-' + idx;
      html += '<tr' + (hasStrength ? ' class="clickable" onclick="toggleDetailRow(\'' + rowId + '\')"' : '') + '>' +
        '<td>' + d + '</td><td>' + escapeHtml(entrySummaryText(e)) + (hasStrength ? ' <span style="color:var(--orange)">▾詳細</span>' : '') + '</td><td>' + escapeHtml(e.memo || '') + '</td></tr>';
      if (hasStrength) {
        html += '<tr id="' + rowId + '" style="display:none"><td colspan="3">' + buildStrengthDetailHtml(e.strengthLog) + '</td></tr>';
      }
    });
    html += '</table>';
    if (filtered.length > DETAIL_TABLE_LIMIT && !detailShowAll) {
      html += '<button type="button" onclick="showAllDetailRows()" style="width:100%;margin-top:12px;padding:11px;border-radius:10px;border:1.5px dashed var(--line);background:transparent;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer">すべて表示（' + filtered.length + '件）</button>';
    }
    html += '</div>';

    wrap.innerHTML = html;
  }

  function toggleDetailRow(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = (el.style.display === 'none') ? 'table-row' : 'none';
  }

  function buildSinglePlayerSeries(entries, field) {
    const byDate = {};
    entries.forEach(e => {
      if (e[field] == null || !e.date) return;
      const ts = e.submittedAt || 0;
      if (!byDate[e.date] || ts >= byDate[e.date].ts) byDate[e.date] = { value: e[field], ts };
    });
    return Object.keys(byDate).sort().map(d => ({ date: d, value: byDate[d].value })).slice(-20);
  }

  // ══ タブ切り替え ══
  function switchTab(tab) {
    ['today', 'team', 'player'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('pane-' + t).classList.toggle('show', t === tab);
    });
  }

  // ══ グラフ描画（player.htmlと同じロジック） ══
  function buildLegendHtml(seriesDefs) {
    const visible = seriesDefs.filter(s => s.points.length);
    if (visible.length <= 1) return '';
    return '<div class="graph-legend">' + visible.map(s =>
      '<span><span class="graph-legend-dot" style="background:' + s.color + '"></span>' + escapeHtml(s.label) + '</span>'
    ).join('') + '</div>';
  }

  function buildMultiLineChartSVG(seriesDefs) {
    const allPoints = seriesDefs.flatMap(s => s.points);
    if (!allPoints.length) {
      return '<div class="empty-msg">まだデータがありません</div>';
    }
    const W = 760, H = 220, padL = 16, padR = 16, padT = 16, padB = 28;
    const vals = allPoints.map(p => p.value);
    let min = Math.min(...vals), max = Math.max(...vals);
    if (min === max) { min -= 1; max += 1; }
    const pad = (max - min) * 0.15;
    min -= pad; max += pad;

    const allDates = Array.from(new Set(allPoints.map(p => p.date))).sort();
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const stepX = allDates.length > 1 ? innerW / (allDates.length - 1) : 0;
    const xForDate = d => padL + stepX * allDates.indexOf(d);
    const yForVal = v => padT + innerH - ((v - min) / (max - min)) * innerH;

    const pathsAndDots = seriesDefs.map(s => {
      if (!s.points.length) return '';
      const xy = s.points.map(p => [xForDate(p.date), yForVal(p.value)]);
      const pathD = xy.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
      const dots = xy.map(p => '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="' + s.color + '"></circle>').join('');
      return '<path d="' + pathD + '" fill="none" stroke="' + s.color + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>' + dots;
    }).join('');

    const labelIdxs = allDates.length <= 8 ? allDates.map((_, i) => i) : [0, Math.floor((allDates.length - 1) / 2), allDates.length - 1];
    const labels = labelIdxs.map(i => {
      const d = (allDates[i] || '').slice(5).replace('-', '/');
      const anchor = i === 0 ? 'start' : (i === allDates.length - 1 ? 'end' : 'middle');
      return '<text x="' + xForDate(allDates[i]).toFixed(1) + '" y="' + (H - 8) + '" font-size="10" fill="var(--sub)" text-anchor="' + anchor + '">' + d + '</text>';
    }).join('');

    return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block">' + pathsAndDots + labels + '</svg>';
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ── 初期化：既にサインイン済みならそのままダッシュボードへ ──
  if (idToken) {
    showDashboard();
  }
</script>
